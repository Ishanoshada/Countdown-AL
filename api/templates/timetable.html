    <style>
        .tt-body {
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-main);
            padding: 20px;
        }
        .tt-container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .tt-header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .tt-header h1 {
            font-size: 2.2rem;
            background: var(--h1-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tt-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .tt-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--theme-btn-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .tt-back:hover {
            background: var(--theme-btn-hover);
            transform: translateX(-3px);
        }

        /* Filter Bar */
        .tt-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            justify-content: center;
        }
        .tt-filter-chip {
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-main);
            white-space: nowrap;
        }
        .tt-filter-chip:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text-primary);
        }
        .tt-filter-chip.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            font-weight: 600;
        }

        /* Sort Controls */
        .tt-sort-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .tt-sort-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .tt-sort-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .tt-sort-btn.active {
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        /* Search */
        .tt-search {
            width: 100%;
            max-width: 400px;
            margin: 15px auto;
            display: block;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.3s;
        }
        .tt-search::placeholder { color: var(--text-muted); }
        .tt-search:focus { border-color: var(--accent-color); }

        /* Stats */
        .tt-stats {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 10px 0;
        }

        /* Day Group */
        .tt-day-group {
            margin-bottom: 25px;
            background: var(--card-bg);
            backdrop-filter: var(--card-backdrop);
            border: var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        .tt-day-header {
            padding: 14px 20px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .tt-day-header:hover {
            background: rgba(255,255,255,0.07);
        }
        .tt-day-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .tt-day-icon.aug { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
        .tt-day-icon.sep { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .tt-day-info { flex: 1; }
        .tt-day-date {
            font-weight: 600;
            font-size: 1rem;
        }
        .tt-day-weekday {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .tt-day-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.08);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .tt-day-arrow {
            color: var(--text-muted);
            transition: transform 0.3s;
            font-size: 0.85rem;
        }
        .tt-day-group.open .tt-day-arrow {
            transform: rotate(90deg);
        }

        /* Exam Entries */
        .tt-entries {
            padding: 8px 12px;
            display: none;
        }
        .tt-day-group.open .tt-entries {
            display: block;
        }
        .tt-entry {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .tt-entry:last-child { border-bottom: none; }
        .tt-entry:hover {
            background: rgba(255,255,255,0.04);
        }
        .tt-entry-time {
            min-width: 100px;
            font-family: 'Fira Code', monospace;
            font-size: 0.82rem;
            color: var(--accent-color);
            padding-top: 2px;
            flex-shrink: 0;
        }
        .tt-entry-subjects {
            flex: 1;
        }
        .tt-entry-sub {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
        }
        .tt-entry-sub .si {
            display: block;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 1px;
        }
        .tt-entry-stream {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stream-physics { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .stream-bio { background: rgba(34,197,94,0.2); color: #4ade80; }
        .stream-commerce { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .stream-arts { background: rgba(244,114,182,0.2); color: #f472b6; }
        .stream-tech { background: rgba(168,85,247,0.2); color: #c084fc; }
        .stream-lang { background: rgba(45,212,191,0.2); color: #2dd4bf; }
        .stream-religion { background: rgba(251,146,60,0.2); color: #fb923c; }

        /* No results */
        .tt-no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .tt-no-results i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        /* Subject view */
        .tt-subject-group {
            margin-bottom: 20px;
            background: var(--card-bg);
            backdrop-filter: var(--card-backdrop);
            border: var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        .tt-subject-header {
            padding: 14px 20px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .tt-subject-header:hover { background: rgba(255,255,255,0.07); }
        .tt-subject-entries { padding: 8px 12px; display: none; }
        .tt-subject-group.open .tt-subject-entries { display: block; }
        .tt-subject-group.open .tt-day-arrow { transform: rotate(90deg); }

        .tt-sub-date {
            font-size: 0.82rem;
            color: var(--accent-color);
            min-width: 90px;
            flex-shrink: 0;
        }
        .tt-sub-time {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 100px;
            flex-shrink: 0;
        }
        .tt-sub-name {
            flex: 1;
            font-size: 0.88rem;
        }
        .tt-sub-si {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tt-header h1 { font-size: 1.6rem; }
            .tt-filters { gap: 6px; }
            .tt-filter-chip { padding: 6px 12px; font-size: 0.75rem; }
            .tt-entry { flex-direction: column; gap: 6px; }
            .tt-entry-time { min-width: auto; }
            .tt-day-header { padding: 12px 14px; }
            .tt-day-date { font-size: 0.9rem; }
            .tt-sub-row { flex-direction: column; gap: 4px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tt-animate { animation: fadeInUp 0.4s ease-out; }
    </style>
</head>

        function getFiltered() {
            var items = DATA;
            if (currentStream !== 'all') {
                items = items.filter(function(e) { return e.streams.indexOf(currentStream) !== -1; });
            }
            if (searchQuery) {
                var q = searchQuery.toLowerCase();
                items = items.filter(function(e) {
                    return e.en.toLowerCase().indexOf(q) !== -1 ||
                           e.si.indexOf(q) !== -1 ||
                           e.date.indexOf(q) !== -1 ||
                           e.time.indexOf(q) !== -1;
                });
            }
            return items;
        }

        // ─── RENDER DATE VIEW ───
        function renderByDate() {
            var items = getFiltered();
            if (!items.length) return '<div class="tt-no-results"><i class="fas fa-search"></i><p>No exams found for this filter</p></div>';

            var groups = {};
            items.forEach(function(e) {
                if (!groups[e.date]) groups[e.date] = { date: e.date, day: e.day, entries: [] };
                groups[e.date].entries.push(e);
            });

            var dates = Object.keys(groups).sort();
            var html = '';
            dates.forEach(function(d) {
                var g = groups[d];
                var dt = new Date(d + 'T00:00:00');
                var month = dt.getMonth() < 8 ? 'aug' : 'sep';
                var dateNum = dt.getDate();
                var entryCount = g.entries.length;
                html += '<div class="tt-day-group tt-animate open" style="animation-delay:' + (dates.indexOf(d) * 0.05) + 's">';
                html += '<div class="tt-day-header" onclick="this.parentElement.classList.toggle(\'open\')">';
                html += '<div class="tt-day-icon ' + month + '">' + dateNum + '</div>';
                html += '<div class="tt-day-info"><div class="tt-day-date">' + formatDate(d) + '</div>';
                html += '<div class="tt-day-weekday">' + g.day + '</div></div>';
                html += '<span class="tt-day-count">' + entryCount + ' exam' + (entryCount > 1 ? 's' : '') + '</span>';
                html += '<i class="fas fa-chevron-right tt-day-arrow"></i></div>';
                html += '<div class="tt-entries">';
                g.entries.forEach(function(e) {
                    html += renderEntry(e);
                });
                html += '</div></div>';
            });
            return html;
        }

        // ─── RENDER SUBJECT VIEW ───
        function renderBySubject() {
            var items = getFiltered();
            if (!items.length) return '<div class="tt-no-results"><i class="fas fa-search"></i><p>No exams found for this filter</p></div>';

            var groups = {};
            items.forEach(function(e) {
                var key = e.en.split('/')[0].trim();
                if (!groups[key]) groups[key] = { name: e.en, si: e.si, entries: [] };
                groups[key].entries.push(e);
            });

            var keys = Object.keys(groups).sort();
            var html = '';
            keys.forEach(function(k) {
                var g = groups[k];
                var count = g.entries.length;
                html += '<div class="tt-subject-group tt-animate open">';
                html += '<div class="tt-subject-header" onclick="this.parentElement.classList.toggle(\'open\')">';
                html += '<span><i class="fas fa-book" style="margin-right:8px;opacity:0.5"></i>' + k + '</span>';
                html += '<div style="display:flex;align-items:center;gap:10px"><span class="tt-day-count">' + count + ' session' + (count > 1 ? 's' : '') + '</span>';
                html += '<i class="fas fa-chevron-right tt-day-arrow"></i></div></div>';
                html += '<div class="tt-subject-entries">';
                g.entries.forEach(function(e) {
                    html += '<div class="tt-entry">';
                    html += '<div class="tt-sub-date">' + formatDateShort(e.date) + '</div>';
                    html += '<div class="tt-sub-time">' + e.time + '</div>';
                    html += '<div class="tt-sub-name">' + e.en + '<div class="tt-sub-si">' + e.si + '</div></div>';
                    html += '</div>';
                });
                html += '</div></div>';
            });
            return html;
        }

        // ─── RENDER ENTRY ───
        function renderEntry(e) {
            var html = '<div class="tt-entry">';
            html += '<div class="tt-entry-time"><i class="fas fa-clock" style="margin-right:4px;opacity:0.5"></i>' + e.time + '</div>';
            html += '<div class="tt-entry-subjects">';
            html += '<div class="tt-entry-sub">' + e.en + '<span class="si">' + e.si + '</span></div>';
            e.streams.forEach(function(s) {
                html += '<span class="tt-entry-stream stream-' + s + '">' + (streamLabels[s] || s) + '</span> ';
            });
            html += '</div></div>';
            return html;
        }

        // ─── HELPERS ───
        function formatDate(d) {
            var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            var dt = new Date(d + 'T00:00:00');
            return dt.getDate() + ' ' + months[dt.getMonth()] + ' 2026';
        }
        function formatDateShort(d) {
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            var dt = new Date(d + 'T00:00:00');
            return dt.getDate() + ' ' + months[dt.getMonth()];
        }

        function updateStats() {
            var items = getFiltered();
            var dates = {};
            items.forEach(function(e) { dates[e.date] = true; });
            document.getElementById('stats').textContent = items.length + ' exams across ' + Object.keys(dates).length + ' days';
        }

        function render() {
            var container = document.getElementById('timetable');
            if (currentSort === 'date') {
                container.innerHTML = renderByDate();
            } else {
                container.innerHTML = renderBySubject();
            }
            updateStats();
        }

        // ─── EVENT LISTENERS ───
        // Stream filters
        document.getElementById('filters').addEventListener('click', function(e) {
            var chip = e.target.closest('.tt-filter-chip');
            if (!chip) return;
            document.querySelectorAll('.tt-filter-chip').forEach(function(c) { c.classList.remove('active'); });
            chip.classList.add('active');
            currentStream = chip.getAttribute('data-stream');
            render();
        });

        // Sort buttons
        document.querySelectorAll('.tt-sort-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tt-sort-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                render();
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value.trim();
            render();
        });

        // Keyboard shortcut
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') window.location.href = '/';
        });

        // ─── INIT ───
        render();
    })();
    </script>

    <!-- Theme Switcher JS -->
    <script>
    (function(){
        var COOKIE = 'al_countdown_theme';
        var html = document.documentElement;
        var btn = document.getElementById('themeToggleBtn');
        var dd = document.getElementById('themeDropdown');
        var opts = document.querySelectorAll('.theme-option');

        function setCookie(n,v,d){try{var x=new Date();x.setTime(x.getTime()+d*864e5);document.cookie=n+'='+encodeURIComponent(v)+';expires='+x.toUTCString()+';path=/;SameSite=Lax';}catch(e){}}

        function apply(t){
            html.setAttribute('data-theme',t);
            opts.forEach(function(o){o.classList.toggle('active',o.dataset.theme===t);});
        }

        // Sync active state from current data-theme (already set by head script)
        opts.forEach(function(o){o.classList.toggle('active',o.dataset.theme===html.getAttribute('data-theme'));});

        btn.addEventListener('click',function(e){e.stopPropagation();dd.classList.toggle('show');});
        opts.forEach(function(o){o.addEventListener('click',function(){apply(o.dataset.theme);setCookie(COOKIE,o.dataset.theme,365);dd.classList.remove('show');});});
        document.addEventListener('click',function(e){if(!dd.contains(e.target)&&e.target!==btn)dd.classList.remove('show');});
        document.addEventListener('keydown',function(e){if(e.key==='Escape')dd.classList.remove('show');});
    })();
    </script>
</body>
</html>
